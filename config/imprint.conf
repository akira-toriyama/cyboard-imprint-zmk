CONFIG_ZMK_RGB_UNDERGLOW=y

# mod-morph 発火時に masked_modifiers の HID report を先に flush するパッチ (akira-toriyama/zmk fork) を有効化。
# 同じフラグで release 側の separate report 化（本来の用途）も有効になる。
#
# TODO: upstream の `zmkfirmware/zmk` PR #3348 (https://github.com/zmkfirmware/zmk/pull/3348)
#       がマージされたら以下を見直す:
#         1. config/west.yml の zmk project を upstream zmkfirmware/main に戻す
#         2. fork の patch ブランチをアーカイブ / 削除
#         3. 上流のマージ時に config が分離・改名されていれば本設定をそれに合わせて更新
CONFIG_ZMK_HID_SEPARATE_MOD_RELEASE_REPORT=y