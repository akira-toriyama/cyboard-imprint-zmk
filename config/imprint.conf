CONFIG_ZMK_RGB_UNDERGLOW=y

# mod-morph 発火時に masked_modifiers の HID report を先に flush するパッチ (akira-toriyama/zmk fork) を有効化。
# 同じフラグで release 側の separate report 化（本来の用途）も有効になる。
# TODO: zmkfirmware/zmk PR #3348 (https://github.com/zmkfirmware/zmk/pull/3348) がマージされたら fork 運用を畳む。
#       手順は issue #13 (https://github.com/akira-toriyama/cyboard-imprint-zmk/issues/13) のチェックリスト参照。
CONFIG_ZMK_HID_SEPARATE_MOD_RELEASE_REPORT=y